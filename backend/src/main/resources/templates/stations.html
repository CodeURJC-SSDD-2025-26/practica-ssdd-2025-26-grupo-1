<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{{title}}</title>

    <!-- Globales, siempre presentes -->
    {{#globalStyles}}
    <link rel="stylesheet" href="{{.}}">
    {{/globalStyles}}
    {{#globalScripts}}
    <script src="{{.}}"></script>
    {{/globalScripts}}

    <!-- Específicos de página, solo si el controller los envía -->
    {{#pageStyles}}
    <link rel="stylesheet" href="/css/{{.}}">
    {{/pageStyles}}
    {{#pageScripts}}
    <script src="/js/{{.}}" defer></script>
    {{/pageScripts}}

</head>
{{# Layout }}
<body>

    <! -- Pagina de ejemplo -->

    <h1>Esta es una página de ejemplo, bienvenido {{name}}</h1>

    {{#stations}}
        <p>Estación: {{name}} en la dirección: {{address}}</p>
    {{/stations}}

</body>
{{/ Layout }}
</html>
