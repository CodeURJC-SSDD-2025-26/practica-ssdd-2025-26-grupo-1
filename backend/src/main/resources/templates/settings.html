<!doctype html>
<html lang="es">
  <head>
      <meta charset="UTF-8">
      <title>{{title}}</title>

      <!-- Globales, siempre presentes -->
      {{#globalStyles}}
      <link rel="stylesheet" href="{{.}}">
      {{/globalStyles}}
      {{#globalScripts}}
      <script src="{{.}}"></script>
      {{/globalScripts}}

      <!-- Específicos de página, solo si el controller los envía -->
      {{#pageStyles}}
      <link rel="stylesheet" href="/css/{{.}}">
      {{/pageStyles}}
      {{#pageScripts}}
      <script src="/js/{{.}}" defer></script>
      {{/pageScripts}}
  </head>

  {{# Layout }}
  <body>

    <main class="container-main">
      <div class="d-flex justify-content-center align-items-center pb-3 gap-4">
        <div class="col-auto">
          <img
            src="{{profile_picture}}"
            width="128"
            height="128"
            class="rounded-circle"
          />
        </div>
        <div class="col-auto">
          <h2 class="fw-bold">{{username}}</h2>
          <h3>{{role}}</h3>
        </div>
      </div>

      <hr class="mt-3">

      <div class="justify-content-center px-5 pt-3">
        <h2 class="form-title">Información personal</h2>
        <form>
            <div class="form-group mb-3">
                <label for="pwd" class="form-label">Nombre de usuario</label>
                <input type="text" class="form-control" id="username" required value="{{username}}" readonly>
            </div>

            <div class="form-group mb-3">
                <label for="email" class="form-label">Correo electrónico</label>
                <input type="email" class="form-control" id="email" required value="{{email}}" readonly>
            </div>

            <div class="form-group mb-3">
                <label for="pwd" class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="pwd" required placeholder="**************" readonly>
            </div>
        </form>

        <h2 class="form-title">Foto de perfil</h2>
        <form>
          <div class="form-group">
            <input type="file" class="form-control-file" id="profilepic" disabled>
          </div>
        </form>
      </div>

    <div class="d-flex justify-content-end me-5">
        <button type="submit" id="edit-settings" class="btn btn-primary me-1">Editar</button>
        <button type="submit" class="btn btn-primary">Guardar cambios</button>
    </div>
      
    </main>
  </body>
  {{/ Layout }}

  <script src="../js/components/change-settings.js"></script>
</html>
