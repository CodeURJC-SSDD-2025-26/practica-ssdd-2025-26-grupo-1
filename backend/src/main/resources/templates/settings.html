<!doctype html>
<html lang="es">
  <head>
      <meta charset="UTF-8">
      <title>{{title}}</title>

      <!-- Globales, siempre presentes -->
      {{#globalStyles}}
      <link rel="stylesheet" href="{{.}}">
      {{/globalStyles}}
      {{#globalScripts}}
      <script src="{{.}}"></script>
      {{/globalScripts}}

      <!-- Específicos de página, solo si el controller los envía -->
      {{#pageStyles}}
      <link rel="stylesheet" href="/css/{{.}}">
      {{/pageStyles}}
      {{#pageScripts}}
      <script src="/js/{{.}}" defer></script>
      {{/pageScripts}}
  </head>

  {{# Layout }}
  <body>

    <main class="container-main">
        <form id="settings-form" action="/registered/settings" method="POST">
            <div class="justify-content-center px-5 pt-3">
                <h2 class="form-title">Información personal</h2>

                <div class="form-group mb-3">
                    <label class="form-label">Nombre de usuario</label>
                    <input type="text" class="form-control" id="username" name="username" value="{{username}}" readonly>
                </div>

                <div class="form-group mb-3">
                    <label class="form-label">Correo electrónico</label>
                    <input type="email" class="form-control" id="email" name="email" value="{{email}}" readonly>
                </div>

                <div class="form-group mb-3">
                    <label class="form-label">Contraseña</label>
                    <input type="password" class="form-control" id="pwd" name="password" placeholder="**************" readonly>
                </div>

                <h2 class="form-title">Foto de perfil</h2>
                <div class="form-group">
                    <input type="file" class="form-control-file" id="profilepic" name="photo" disabled>
                </div>
            </div>

            <div class="d-flex justify-content-end me-5">
                <button type="button" id="edit-settings" class="btn btn-primary me-1">Editar</button>
                <button type="submit" class="btn btn-primary">Guardar cambios</button>
            </div>
        </form>
    </main>
  </body>
  {{/ Layout }}

  {{#pageScriptsBottom}}
  <script src="/js/{{.}}" defer></script>
  {{/pageScriptsBottom}}
</html>
