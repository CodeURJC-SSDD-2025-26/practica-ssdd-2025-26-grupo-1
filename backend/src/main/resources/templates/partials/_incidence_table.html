<div class="row d-flex justify-content-center align-items-center ms-3 me-3">
  <div class="col-12">
    <div style="overflow-x:auto">
      <table class="table table-striped table-bordered">
        <thead>
          <tr>
            <th class="td_center">Líneas</th>
            <th class="td_center">Severidad</th>
            <th class="td_center">Tipo</th>
            <th class="td_center">Ver más</th>
            <th class="td_center">Modificar</th>
            <th class="td_center">Eliminar</th>
          </tr>
        </thead>
        <tbody>
          {{#incidences}}
            <tr>
              <td>Líneas</td>
              <td>{{incidence.incidenceLevel}}</td>
              <td>{{incidence.incidenceType}}</td>
              <td>
                <button class="btn btn-sm btn-warning me-1"
                      data-bs-toggle="modal"
                      data-bs-target="#editModal"
                      data-json="{{ json }}">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-pencil-square" viewBox="0 0 16 16">
                    <path d="M15.502 1.94a.5.5 0 0 1 0 .706L14.459 3.69l-2-2L13.502.646a.5.5 0 0 1 .707 0l1.293 1.293zm-1.75 2.456-2-2L4.939 9.21a.5.5 0 0 0-.121.196l-.805 2.414a.25.25 0 0 0 .316.316l2.414-.805a.5.5 0 0 0 .196-.12l6.813-6.814z"/>
                    <path fill-rule="evenodd" d="M1 13.5A1.5 1.5 0 0 0 2.5 15h11a1.5 1.5 0 0 0 1.5-1.5v-6a.5.5 0 0 0-1 0v6a.5.5 0 0 1-.5.5h-11a.5.5 0 0 1-.5-.5v-11a.5.5 0 0 1 .5-.5H9a.5.5 0 0 0 0-1H2.5A1.5 1.5 0 0 0 1 2.5z"/>
                  </svg>
                </button>
                
                <form action="/admin/admin_panel_incidences/delete" method="post" class="d-inline" onsubmit="return confirm('¿Está seguro de querer eliminarlo?')">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-ban" viewBox="0 0 16 16">
                    <path d="M15 8a6.97 6.97 0 0 0-1.71-4.584l-9.874 9.875A7 7 0 0 0 15 8M2.71 12.584l9.874-9.875a7 7 0 0 0-9.874 9.874ZM16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0"/>
                  </svg>
                </form>
              </td>
            </tr>
          {{/incidences}}
          {{^incidences}}
            <tr>
              <td colspan="6" class="td_center">No hay incidencias registradas.</td>
            </tr>
          {{/incidences}}
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Modal de edición -->
<div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="mb-0 text-uppercase text-center text-white" id="editModalLabel">Modificar incidencia</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>
      
      <form action="/admin/admin_panel_incidences/update" method="POST" enctype="multipart/form-data">
        <div class="modal-body">

          <div class="mb-3">
            <label for="edit-lines" class="form-label">Líneas</label>
            <select class="form-control" id="line-selection" name="lines-select" multiple>
              {{#lines}}
              <option value={{.}}>{{name}}</option>
              {{/lines}}    
            </select>
          </div>

          <div class="mb-3">
            <label for="edit-severity" class="form-label">Severidad</label>
            <select class="form-control" id="severity-selection" name="severity-select">
              <option value="minor">Leve</option>
              <option value="moderate">Moderado</option>
              <option value="severe">Serio</option>
              <option value="critical">Crítico</option> 
            </select>
          </div>

          <div class="mb-3">
            <label for="edit-type" class="form-label">Tipo</label>
            <select class="form-select" id="type-selection" name="type-select">
              <option value="maintenance">Mantenimiento</option>
              <option value="accident">Accidente</option>
              <option value="others">Otro</option>
            </select>
          </div>

          <div class="mb-3">
            <label for="edit-description" class="form-label">Descripción</label>
            <textarea class="form-control" id="description"></textarea>
          </div>

          <div class="mb-3">
            <label for="edit-date" class="form-label">Fecha y hora</label>
            <input type="text" class="form-control" id="date"></textarea>
          </div>

          <div class="mb-3">
            <label for="edit-status" class="form-label">Estado</label>
            <select class="form-select" id="status-selection" name="status-select">
              <option value="active">Activo</option>
              <option value="closed">Cerrado</option>
            </select>
          </div>

        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" class="btn btn-primary">Guardar cambios</button>
        </div>
      </form>
    </div>
  </div>
</div>
