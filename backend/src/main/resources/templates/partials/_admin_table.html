<div class="row d-flex justify-content-center align-items-center ms-3 me-3">
  <div class="col-12">
    <div style="overflow-x:auto">
      <table class="table table-striped table-bordered">
        <thead>
        <tr>
          <th class="td_center">Nombre de usuario</th>
          <th class="td_center">Correo electrónico</th>
          <th class="td_center">Rol</th>
          <th class="td_center">Foto de perfil</th>
          <th class="td_center">Modificar</th>
          <th class="td_center">Eliminar</th>
        </tr>
        </thead>
        <tbody>
        {{#users}}
        <tr>
          <td class="td_center">{{user.username}}</td>
          <td class="td_center">{{user.email}}</td>
          <td class="td_center">{{user.role}}</td>
          <td class="td_center"><img src="{{image}}" alt="error al cargar la imagen" width="50" height="50"></td>
          <td class="td_center">
            <button type="button"
                    class="btn btn-link p-0 border-0 bg-transparent btn-edit"
                    data-bs-toggle="modal"
                    data-bs-target="#editModal"
                    data-username="{{user.username}}"
                    data-email="{{user.email}}"
                    data-role="{{user.role}}"
                    data-image="{{image}}">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-pencil-square" viewBox="0 0 16 16">
                <path d="M15.502 1.94a.5.5 0 0 1 0 .706L14.459 3.69l-2-2L13.502.646a.5.5 0 0 1 .707 0l1.293 1.293zm-1.75 2.456-2-2L4.939 9.21a.5.5 0 0 0-.121.196l-.805 2.414a.25.25 0 0 0 .316.316l2.414-.805a.5.5 0 0 0 .196-.12l6.813-6.814z"/>
                <path fill-rule="evenodd" d="M1 13.5A1.5 1.5 0 0 0 2.5 15h11a1.5 1.5 0 0 0 1.5-1.5v-6a.5.5 0 0 0-1 0v6a.5.5 0 0 1-.5.5h-11a.5.5 0 0 1-.5-.5v-11a.5.5 0 0 1 .5-.5H9a.5.5 0 0 0 0-1H2.5A1.5 1.5 0 0 0 1 2.5z"/>
              </svg>
            </button>
          </td>
          <td class="td_center">
            <form action="/admin/admin_panel/delete" method="post" style="display:inline;">
              <input type="hidden" name="{{csrf.parameterName}}" value="{{csrf.token}}">
              <input type="hidden" name="username" value="{{user.username}}">
              <input type="hidden" name="email" value="{{user.email}}">
              <input type="hidden" name="role" value="{{user.role}}">
              <input type="hidden" name="image" value="{{user.image}}">
              <button type="submit" class="btn btn-link p-0 border-0 bg-transparent">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-ban" viewBox="0 0 16 16">
                  <path d="M15 8a6.97 6.97 0 0 0-1.71-4.584l-9.874 9.875A7 7 0 0 0 15 8M2.71 12.584l9.874-9.875a7 7 0 0 0-9.874 9.874ZM16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0"/>
                </svg>
              </button>
            </form>
          </td>
        </tr>
        {{/users}}
        {{^users}}
        <tr>
          <td colspan="6" class="td_center">No hay usuarios registrados.</td>
        </tr>
        {{/users}}
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Modal de edición -->
<div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="mb-0 text-uppercase text-center text-white" id="editModalLabel">Modificar usuario</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>
      <!-- 1. enctype multipart para soportar subida de imagen -->
      <form action="/admin/admin_panel/update" method="POST" enctype="multipart/form-data">
        <input type="hidden" name="{{csrf.parameterName}}" value="{{csrf.token}}">
        <input type="hidden" id="originalUsername" name="oldUsername">

        <div class="modal-body">

          <div class="mb-3">
            <label for="editUsername" class="form-label">Nombre de usuario</label>
            <input type="text" class="form-control" id="editUsername" name="username">
          </div>

          <div class="mb-3">
            <label for="editEmail" class="form-label">Correo electrónico</label>
            <input type="email" class="form-control" id="editEmail" name="email">
          </div>

          <!-- 2. Selector de rol con opciones del enum -->
          <div class="mb-3">
            <label for="editRole" class="form-label">Rol</label>
            <select class="form-select" id="editRole" name="role">
              {{#roles}}
              <option value="{{name}}">{{name}}</option>
              {{/roles}}
            </select>
          </div>

          <!-- 3. Input de tipo file para la imagen -->
          <div class="mb-3">
            <label for="editImage" class="form-label">Foto de perfil</label>
            <input type="file"
                   class="form-control-file"
                   id="editImage"
                   name="newImage"
                   accept="image/*">
            <!-- Preview de la imagen actual -->
            <div class="mt-2">
              <small class="text-muted">Imagen actual:</small><br>
              <img id="currentImagePreview" src="" alt="Imagen actual" width="60" height="60"
                   class="mt-1 rounded" style="object-fit: cover;">
            </div>
          </div>

        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" class="btn btn-primary">Guardar cambios</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
  document.getElementById('editModal').addEventListener('show.bs.modal', function (event) {
    const btn = event.relatedTarget;

    document.getElementById('originalUsername').value = btn.dataset.username;
    document.getElementById('editUsername').value = btn.dataset.username;
    document.getElementById('editEmail').value = btn.dataset.email;

    // Seleccionar el rol actual en el <select>
    const roleSelect = document.getElementById('editRole');
    const currentRole = btn.dataset.role;
    for (let option of roleSelect.options) {
      option.selected = (option.value === currentRole);
    }

    // Mostrar preview de la imagen actual
    const preview = document.getElementById('currentImagePreview');
    preview.src = btn.dataset.image || '';
    preview.style.display = btn.dataset.image ? 'inline-block' : 'none';
  });
</script>
