<div style="overflow-x:auto;">
  <div class="row d-flex justify-content-center align-items-center ms-3 me-3">
    <div class="col-12">
      <table class="table table-striped table-bordered">
        <thead>
          <tr>
            <th class="td_center">
              Línea
            </th>

            <th class="td_center">
              Fecha de inicio
            </th>

            <th class="td_center">
              Fecha de fin
            </th>

            <th class="td_center">
              Hora de inicio
            </th>

            <th class="td_center">
              Hora de fin
            </th>

            <th class="td_center">
              Modificar
            </th>

            <th class="td_center">
              Eliminar
            </th>

          </tr>
        </thead>

        <tbody>
          {{#alerts}}
          <tr>
            <td class="td_center">
              {{line.name}}
            </td>

            <td class="td_center">
              {{startDate}}
            </td>

            <td class="td_center">
              {{endDate}}
            </td>

            <td class="td_center">
              {{startHour}}
            </td>

            <td class="td_center">
              {{endHour}}
            </td>

            <td class="td_center">
              <a href="form-alert.html">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                  class="bi bi-pencil-square" viewBox="0 0 16 16">
                  <path
                    d="M15.502 1.94a.5.5 0 0 1 0 .706L14.459 3.69l-2-2L13.502.646a.5.5 0 0 1 .707 0l1.293 1.293zm-1.75 2.456-2-2L4.939 9.21a.5.5 0 0 0-.121.196l-.805 2.414a.25.25 0 0 0 .316.316l2.414-.805a.5.5 0 0 0 .196-.12l6.813-6.814z" />
                  <path fill-rule="evenodd"
                    d="M1 13.5A1.5 1.5 0 0 0 2.5 15h11a1.5 1.5 0 0 0 1.5-1.5v-6a.5.5 0 0 0-1 0v6a.5.5 0 0 1-.5.5h-11a.5.5 0 0 1-.5-.5v-11a.5.5 0 0 1 .5-.5H9a.5.5 0 0 0 0-1H2.5A1.5 1.5 0 0 0 1 2.5z" />
                </svg>
              </a>
            </td>

            <td class="td_center">
              <a href="user_alerts.html">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-ban"
                  viewBox="0 0 16 16">
                  <path
                    d="M15 8a6.97 6.97 0 0 0-1.71-4.584l-9.874 9.875A7 7 0 0 0 15 8M2.71 12.584l9.874-9.875a7 7 0 0 0-9.874 9.874ZM16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0" />
                </svg>
              </a>
            </td>
          </tr>
          {{/alerts}}
        </tbody>
      </table>
    </div>
  </div>
</div>
