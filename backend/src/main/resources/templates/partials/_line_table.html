<div class="row d-flex justify-content-center align-items-center ms-3 me-3">
  <div class="col-12">
    <div style="overflow-x:auto">
      <table class="table table-striped table-bordered">
        <thead>
        <tr>
          <th class="td_center">Nombre de linea</th>
          <th class="td_center">Descripción</th>
          <th class="td_center">Modificar</th>
          <th class="td_center">Eliminar</th>
        </tr>
        </thead>
        <tbody>
        {{#lines}}
        <tr>
          <td class="td_center">{{line.name}}</td>
          <td class="td_center">{{line.description}}</td>
          <td class="td_center">
            <button type="button"
                    class="btn btn-link p-0 border-0 bg-transparent btn-edit"
                    data-bs-toggle="modal"
                    data-bs-target="#editModal"
                    data-name="{{line.name}}"
                    data-description="{{line.description}}">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-pencil-square" viewBox="0 0 16 16">
                <path d="M15.502 1.94a.5.5 0 0 1 0 .706L14.459 3.69l-2-2L13.502.646a.5.5 0 0 1 .707 0l1.293 1.293zm-1.75 2.456-2-2L4.939 9.21a.5.5 0 0 0-.121.196l-.805 2.414a.25.25 0 0 0 .316.316l2.414-.805a.5.5 0 0 0 .196-.12l6.813-6.814z"/>
                <path fill-rule="evenodd" d="M1 13.5A1.5 1.5 0 0 0 2.5 15h11a1.5 1.5 0 0 0 1.5-1.5v-6a.5.5 0 0 0-1 0v6a.5.5 0 0 1-.5.5h-11a.5.5 0 0 1-.5-.5v-11a.5.5 0 0 1 .5-.5H9a.5.5 0 0 0 0-1H2.5A1.5 1.5 0 0 0 1 2.5z"/>
              </svg>
            </button>
          </td>
          <td class="td_center">
            <form action="/admin/admin_panel_lines/delete" method="post" style="display:inline;">
              <input type="hidden" name="linename" value="{{line.name}}">
              <input type="hidden" name="description" value="{{line.description}}">
              <button type="submit" class="btn btn-link p-0 border-0 bg-transparent">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-ban" viewBox="0 0 16 16">
                  <path d="M15 8a6.97 6.97 0 0 0-1.71-4.584l-9.874 9.875A7 7 0 0 0 15 8M2.71 12.584l9.874-9.875a7 7 0 0 0-9.874 9.874ZM16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0"/>
                </svg>
              </button>
            </form>
          </td>
        </tr>
        {{/lines}}
        {{^lines}}
        <tr>
          <td colspan="6" class="td_center">No hay lineas registradas.</td>
        </tr>
        {{/lines}}
        </tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="mb-0 text-uppercase text-center text-white" id="editModalLabel">Modificar usuario</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>
      <form action="/admin/admin_panel_lines/update" method="POST" enctype="multipart/form-data">
        <input type="hidden" id="oldName" name="oldName">

        <div class="modal-body">

          <div class="mb-3">
            <label for="editName" class="form-label">Nombre de linea</label>
            <input type="text" class="form-control" id="editName" name="newName">
          </div>

          <div class="mb-3">
            <label for="editDescription" class="form-label">Descripción</label>
            <input type="text" class="form-control" id="editDescription" name="description">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" class="btn btn-primary">Guardar cambios</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
  document.getElementById('editModal').addEventListener('show.bs.modal', function (event) {
    const btn = event.relatedTarget;

    document.getElementById('oldName').value = btn.dataset.name; 
    document.getElementById('editName').value = btn.dataset.name;
    document.getElementById('editDescription').value = btn.dataset.description;
  });
</script>
