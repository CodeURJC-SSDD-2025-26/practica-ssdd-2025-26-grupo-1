<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Error {{status}}</title>

  <!-- Globales, siempre presentes -->
  {{#globalStyles}}
  <link rel="stylesheet" href="{{.}}">
  {{/globalStyles}}
  {{#globalScripts}}
  <script src="{{.}}"></script>
  {{/globalScripts}}
</head>

{{# Layout }}
<body>
  <main class="container-main">
    <div class="d-flex justify-content-center align-items-center pb-3 gap-4">
      <h1>Ha ocurrido un error</h1>
    </div>
    <div class="d-flex justify-content-center align-items-center pb-3 gap-4">
      <h2>Error: {{error}}</h2>
    </div>
  </main>
</body>
{{/ Layout }}

</html>
