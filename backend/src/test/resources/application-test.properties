# ============================================================================
# Spring Boot - Configuración para Tests
# ============================================================================

# Base de Datos (MySQL service container de GitHub Actions)
spring.datasource.url=jdbc:mysql://localhost:3306/trainfyre_test
spring.datasource.username=trainfyre
spring.datasource.password=trainfyre123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=false

# Logging (silenciar ruido en tests)
logging.level.root=WARN
logging.level.codeurjc.ssdd=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN

# Tests
spring.test.mockmvc.print=false
spring.test.database.replace=none
