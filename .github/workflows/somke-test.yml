name: Spring Boot Smoke Test (Dev Branch)

on:
  push:
    branches:
      - development
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: ./mvnw clean package -DskipTests

      - name: Run Spring Boot App in Background
        run: |
          # Start the app and redirect logs to a file for debugging if it fails
          java -jar target/*.jar > app.log 2>&1 & 
          echo "APP_PID=$!" >> $GITHUB_ENV

      - name: Wait for Health Check
        run: |
          echo "Waiting for application to start on development branch..."
          timeout 60s bash -c '
            until curl -s localhost:8080/actuator/health | grep "UP"; do
              echo "Waiting..."
              sleep 5
            done
          '
          echo "Success: Application is UP!"

      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: app-logs
          path: app.log

      - name: Shutdown App
        if: always()
        run: |
          if [ -n "$APP_PID" ]; then
            kill $APP_PID
          fi