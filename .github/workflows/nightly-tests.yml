name: 🌙 Nightly Tests - TrainFyre Backend

on:
  # Trigger automático: Cada noche a las 03:00 AM (hora de Madrid/España)
  # En UTC, Madrid está UTC+1 (invierno) o UTC+2 (verano)
  # Por lo tanto, 03:00 Madrid = 02:00 UTC (invierno) o 01:00 UTC (verano)
  # GitHub Actions usa UTC, así que establecemos cron a las 02:00 UTC
  schedule:
    - cron: '0 2 * * *'  # 02:00 UTC = 03:00 Madrid (ajusta según horario)
  
  # Trigger manual desde GitHub Actions UI
  workflow_dispatch:

env:
  JAVA_VERSION: '21'
  MAVEN_HOME: '/usr/share/maven'
  BACKEND_DIR: 'Backend'

jobs:
  
  # ============================================================================
  # PASO 1: VERIFICAR EXISTENCIA DE TESTS
  # ============================================================================
  check-tests:
    name: 📊 Verificar Tests Disponibles
    runs-on: ubuntu-latest
    outputs:
      tests_exist: ${{ steps.check.outputs.exists }}
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 Verificar existencia de archivos de test
        id: check
        run: |
          TEST_COUNT=$(find ${{ env.BACKEND_DIR }}/src/test/java -type f \( -name "*Test.java" -o -name "*Tests.java" \) 2>/dev/null | wc -l)
          if [ "$TEST_COUNT" -gt 0 ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ Se encontraron $TEST_COUNT archivo(s) de test"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️ No hay tests en src/test/java"
          fi

  # ============================================================================
  # PASO 2: SETUP JAVA Y CACHEAR MAVEN
  # ============================================================================
  setup-maven:
    name: ⚡ Setup Java + Maven Cache
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'
          cache-dependency-path: '${{ env.BACKEND_DIR }}/pom.xml'

      - name: 📦 Resolver Dependencias Maven
        run: |
          cd ${{ env.BACKEND_DIR }}
          mvn dependency:resolve -DskipTests -q
        continue-on-error: true

  # ============================================================================
  # PASO 3: COMPILAR Y EJECUTAR TESTS
  # ============================================================================
  run-tests:
    name: 🧪 Ejecutar Tests Nightly
    needs: [check-tests, setup-maven]
    runs-on: ubuntu-latest
    
    # Service Container para MySQL (para tests de integración)
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root123
          MYSQL_DATABASE: trainfyre_test
          MYSQL_USER: trainfyre
          MYSQL_PASSWORD: trainfyre123
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 3306:3306

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'
          cache-dependency-path: '${{ env.BACKEND_DIR }}/pom.xml'

      - name: ⏳ Esperar a MySQL (máx 2 min)
        if: needs.check-tests.outputs.tests_exist == 'true'
        run: |
          echo "⏳ Esperando a que MySQL esté disponible..."
          for i in {1..24}; do
            if nc -z localhost 3306 2>/dev/null; then
              echo "✅ MySQL está listo en el intento $i"
              exit 0
            fi
            echo "Intento $i/24: MySQL no responde aún..."
            sleep 5
          done
          echo "⚠️ MySQL tardó en iniciarse, continuando igualmente..."
          exit 0
        timeout-minutes: 2

      - name: 🧪 Compilar y Ejecutar Tests
        if: needs.check-tests.outputs.tests_exist == 'true'
        run: |
          cd ${{ env.BACKEND_DIR }}
          
          echo "═══════════════════════════════════════════════════════════════"
          echo "🧪 INICIANDO TESTS NIGHTLY"
          echo "═══════════════════════════════════════════════════════════════"
          
          mvn clean test \
            -Dspring.datasource.url=jdbc:mysql://localhost:3306/trainfyre_test \
            -Dspring.datasource.username=trainfyre \
            -Dspring.datasource.password=trainfyre123 \
            -Dspring.jpa.hibernate.ddl-auto=create-drop \
            -DskipITs=false \
            -Dmaven.test.failure.ignore=false \
            -B -V
          
          echo ""
          echo "═══════════════════════════════════════════════════════════════"
          echo "✅ Tests completados"
          echo "═══════════════════════════════════════════════════════════════"
        timeout-minutes: 30

      - name: ⏭️ SKIP: No tests encontrados
        if: needs.check-tests.outputs.tests_exist == 'false'
        run: |
          echo ""
          echo "═══════════════════════════════════════════════════════════════"
          echo "⚠️  SKIP: No tests found"
          echo "═══════════════════════════════════════════════════════════════"
          echo ""
          echo "📌 Estado del Workflow:"
          echo "   ✓ Workflow ejecutado correctamente"
          echo "   ✗ No hay archivos de test en Backend/src/test/java"
          echo ""
          echo "📝 Para añadir tests:"
          echo "   1. Copiar SmokeTest.java a Backend/src/test/java/.../trainfyre/"
          echo "   2. Crear más tests en el mismo directorio"
          echo "   3. Hacer git push"
          echo ""
          echo "💡 Este es un estado ESPERADO (NO ES UN ERROR)"
          echo "═══════════════════════════════════════════════════════════════"
          exit 0

      - name: 📊 Subir Reportes Surefire
        if: always() && needs.check-tests.outputs.tests_exist == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-${{ github.run_number }}
          path: ${{ env.BACKEND_DIR }}/target/surefire-reports/
          if-no-files-found: warn
          retention-days: 30

      - name: 📈 Generar Reporte JUnit (si hay tests)
        if: always() && needs.check-tests.outputs.tests_exist == 'true'
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: ${{ env.BACKEND_DIR }}/target/surefire-reports/TEST-*.xml
          check_name: '🧪 JUnit Test Results'
          comment_mode: 'always'
        continue-on-error: true

  # ============================================================================
  # PASO 4: PROCESAR FALLOS Y GENERAR REPORTES
  # ============================================================================
  handle-failure:
    name: 🔴 Procesar Fallos (si existen)
    if: failure() && needs.run-tests.result == 'failure'
    needs: [run-tests, check-tests]
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 📥 Descargar Reportes
        uses: actions/download-artifact@v4
        with:
          name: surefire-reports-${{ github.run_number }}
          path: ./test-reports/
        continue-on-error: true

      - name: 📋 Generar Reporte de Errores
        run: |
          echo ""
          echo "═══════════════════════════════════════════════════════════════"
          echo "❌ NIGHTLY TESTS - ERRORES DETECTADOS"
          echo "═══════════════════════════════════════════════════════════════"
          echo ""
          echo "📅 Fecha/Hora: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo "🏃 Workflow: ${{ github.workflow }}"
          echo "📌 Run ID: ${{ github.run_number }}"
          echo "🔗 Rama: ${{ github.ref_name }}"
          echo ""
          
          if [ -d "test-reports" ] && [ "$(ls -A test-reports/)" ]; then
            echo "📊 REPORTES DISPONIBLES:"
            ls -lah test-reports/
            echo ""
            echo "📄 Contenido de TEST-*.txt:"
            for file in test-reports/TEST-*.txt; do
              if [ -f "$file" ]; then
                echo ""
                echo "--- $file ---"
                tail -30 "$file"
              fi
            done
          else
            echo "⚠️ No se encontraron reportes detallados"
            echo "Revisa los logs del paso 'run-tests' para más información"
          fi
          
          echo ""
          echo "═══════════════════════════════════════════════════════════════"
          echo "🔗 Ver detalles en:"
          echo "   GitHub Actions: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "═══════════════════════════════════════════════════════════════"

  # ============================================================================
  # PASO 5: NOTIFICACIÓN DE ÉXITO
  # ============================================================================
  success-notify:
    name: ✅ Tests Completados (Éxito)
    if: success()
    needs: [run-tests, check-tests]
    runs-on: ubuntu-latest
    steps:
      - name: 🎉 Notificación de Éxito
        run: |
          echo ""
          echo "═══════════════════════════════════════════════════════════════"
          echo "✅ NIGHTLY TESTS - COMPLETED SUCCESSFULLY"
          echo "═══════════════════════════════════════════════════════════════"
          echo ""
          echo "📅 Fecha/Hora: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo "🧪 Tests ejecutados: ${{ needs.check-tests.outputs.tests_exist == 'true' && 'SÍ' || 'SKIP (sin tests)' }}"
          echo "📦 Rama: ${{ github.ref_name }}"
          echo "👤 Ejecutado por: @${{ github.actor }}"
          echo ""
          echo "═══════════════════════════════════════════════════════════════"
