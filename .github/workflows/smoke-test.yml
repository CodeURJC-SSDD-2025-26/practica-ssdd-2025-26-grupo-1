name: Spring Boot Smoke Test

on:
  push:
    branches:
      - Development
    paths-ignore:
      - 'README.md'
  workflow_dispatch:


jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean package -DskipTests
        working-directory: backend
        
      - name: Run Spring Boot App in Background
        working-directory: backend
        run: |
          java -jar target/*.jar > app.log 2>&1 &
          echo "APP_PID=$!" >> $GITHUB_ENV

      - name: Wait for App Readiness
        run: |
          echo "Waiting for application to start on https://localhost:8443/login ..."
          timeout 90s bash -c '
            while true; do
              code=$(curl -sk -o /dev/null -w "%{http_code}" https://localhost:8443/login 2>/dev/null)
              echo "Current response code: $code"
              if [ "$code" = "200" ] || [ "$code" = "302" ]; then
                echo "Success: Application is UP!"
                exit 0
              fi
              sleep 5
            done
          ' || {
            echo "Application failed to start within timeout"
            cat backend/app.log
            exit 1
          }

      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: app-logs
          path: backend/app.log

      - name: Shutdown App
        if: always()
        run: |
          if [ -n "$APP_PID" ]; then
            kill "$APP_PID" || true
          fi