name: Spring Boot Smoke Test

on:
  push:
    branches:
      - Development
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        working-directory: ./backend

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean package -DskipTests
        

      - name: Run Spring Boot App in Background
        run: |
          # The jar is in the root target folder
          java -jar target/*.jar > app.log 2>&1 & 
          echo "APP_PID=$!" >> $GITHUB_ENV

      - name: Wait for Health Check
        run: |
          echo "Waiting for application to start..."
          # Actuator health check on port 8080
          timeout 60s bash -c '
            until curl -s localhost:8080/actuator/health | grep "UP"; do
              echo "Waiting..."
              sleep 5
            done
          '
          echo "Success: Application is UP!"

      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: app-logs
          path: app.log

      - name: Shutdown App
        if: always()
        run: |
          if [ -n "$APP_PID" ]; then
            kill $APP_PID
          fi